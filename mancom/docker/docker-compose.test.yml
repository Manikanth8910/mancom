version: "3.8"

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: mancom-postgres-test
    environment:
      POSTGRES_USER: mancom_test
      POSTGRES_PASSWORD: mancom_test_password
      POSTGRES_DB: mancom_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    container_name: mancom-redis-test
    ports:
      - "6380:6379"
    tmpfs:
      - /data
